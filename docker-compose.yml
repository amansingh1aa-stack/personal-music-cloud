version: "3.9"

services:
  prisma-init:
    image: node:22-bookworm-slim
    working_dir: /app
    command: >
      sh -c "apt-get update && apt-get install -y ffmpeg python3-pip &&
      pip3 install --break-system-packages yt-dlp &&
      npm install &&
      npm run prisma:generate --workspace apps/api &&
      npm run prisma:migrate --workspace apps/api"
    env_file:
      - .env
    volumes:
      - ./:/app
      - music-data:/app/music
      - api-storage:/app/apps/api/storage

  api:
    image: node:22-bookworm-slim
    working_dir: /app
    command: >
      sh -c "apt-get update && apt-get install -y ffmpeg python3-pip &&
      pip3 install --break-system-packages yt-dlp &&
      npm install &&
      npm run prisma:generate --workspace apps/api &&
      npm run build --workspace apps/api &&
      npm run start --workspace apps/api"
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./:/app
      - music-data:/app/music
      - api-storage:/app/apps/api/storage
    depends_on:
      - prisma-init

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run build --workspace apps/web && npm run start --workspace apps/web"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    volumes:
      - ./:/app
    depends_on:
      - api

volumes:
  music-data:
  api-storage: