name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Show workspace files
        run: find . -maxdepth 3 -type f | sort